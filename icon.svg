<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <!-- ∠ symbol -->
  <text x="256" y="340" text-anchor="middle" font-family="'Times New Roman','Noto Serif',serif"
        font-size="340" font-weight="bold" fill="#818cf8">∠</text>
  <!-- Decorative arc -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#6366f1" stroke-width="4" opacity="0.3"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.2"/>
</svg>
